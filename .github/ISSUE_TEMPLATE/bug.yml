name: Bug
description: Something is broken or behaving unexpectedly
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      value: |
        1.
        2.
        3.
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: macOS version, shell version, relevant tool versions
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Screenshots, logs, or additional context (optional)
